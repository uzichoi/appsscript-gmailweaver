<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gmail Network Graph</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        font-family: Arial, sans-serif; 
        width: 100vw; 
        height: 100vh; 
        overflow: hidden;
      }
      #loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 18px;
        color: #666;
      }
      #error {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: red;
        display: none;
      }
      #chart-container {
        width: 100%;
        height: 100%;
        display: none;
      }
      .tooltip {
        position: absolute;
        visibility: hidden;
        white-space: pre-line;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        padding: 10px;
        border-radius: 8px;
        font-size: 12px;
        pointer-events: none;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div id="loading">Loading Gmail data...</div>
    <div id="error"></div>
    <div id="chart-container"></div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
      // 데이터 로드
      google.script.run
        .withSuccessHandler(renderGraph)
        .withFailureHandler(showError)
        .getGraphData();

      function showError(err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error: ' + (err.message || err);
      }

      function renderGraph(data) {
        document.getElementById('loading').style.display = 'none';
        
        if (data.error) {
          showError({ message: data.error });
          return;
        }

        if (!data.nodes || data.nodes.length === 0) {
          showError({ message: 'No data found' });
          return;
        }

        document.getElementById('chart-container').style.display = 'block';
        
        const container = document.getElementById('chart-container');
        const width = container.clientWidth;
        const height = container.clientHeight;

        const HIDDEN_TYPES = new Set(['EMAIL', 'DATE', 'EMAIL_ADDRESS', 'FILE_TYPE']);
        const getNodeType = (n) => String(n.entity_type || n.type || '').toUpperCase();

        const visibleNodes = data.nodes.filter(n => !HIDDEN_TYPES.has(getNodeType(n)));
        const visibleIdSet = new Set(visibleNodes.map(n => String(n.id)));
        const visibleEdges = data.edges.filter(e => 
          visibleIdSet.has(String(e.source)) && visibleIdSet.has(String(e.target))
        );

        const nodes = visibleNodes.map(d => ({
          ...d,
          degree: typeof d.degree === 'number' ? d.degree : 5
        }));

        const edges = visibleEdges.map(d => ({
          ...d,
          value: 1,
          description: typeof d.description === 'string' ? d.description : ''
        }));

        const color = d3.scaleOrdinal(['#f7ad63', '#6ade53', '#f15fb2', '#83d7f1', '#a133ff']);
        const sizeScale = d3.scaleLinear()
          .domain([0, d3.max(nodes, d => d.degree)])
          .range([15, 30]);

        const svg = d3.select(container)
          .append('svg')
          .attr('width', '100%')
          .attr('height', '100%')
          .attr('viewBox', [0, 0, width, height]);

        const graphGroup = svg.append('g');

        const tooltip = d3.select('body')
          .append('div')
          .attr('class', 'tooltip');

        const showTooltip = (event, text) => {
          tooltip
            .style('visibility', 'visible')
            .text(text)
            .style('top', `${event.pageY + 10}px`)
            .style('left', `${event.pageX + 10}px`);
        };

        const hideTooltip = () => tooltip.style('visibility', 'hidden');

        const simulation = d3.forceSimulation(nodes)
          .force('link', d3.forceLink(edges).id(d => d.id).distance(150).strength(0.2))
          .force('charge', d3.forceManyBody().strength(-50).distanceMin(20).distanceMax(500))
          .force('center', d3.forceCenter(width / 2, height / 2))
          .force('collision', d3.forceCollide().radius(d => sizeScale(d.degree) + 10))
          .force('x', d3.forceX(width / 2).strength(0.05))
          .force('y', d3.forceY(height / 2).strength(0.05))
          .alphaDecay(0.03)
          .alphaTarget(0.02);

        const edge = graphGroup.append('g')
          .attr('stroke', '#999')
          .attr('stroke-opacity', 0.6)
          .selectAll('line')
          .data(edges)
          .join('line')
          .attr('stroke-width', d => Math.sqrt(d.value))
          .on('mouseover', (event, d) => showTooltip(event, d.description || 'No description'))
          .on('mouseout', hideTooltip);

        const nodeGroup = graphGroup.append('g')
          .selectAll('g')
          .data(nodes)
          .join('g')
          .on('mouseover', (event, d) => {
            const text = `ID: ${d.id}\nDescription: ${d.description || 'No description'}`;
            showTooltip(event, text);
          })
          .on('mouseout', hideTooltip)
          .call(d3.drag()
            .on('start', event => {
              if (!event.active) simulation.alphaTarget(0.3).restart();
              event.subject.fx = event.subject.x;
              event.subject.fy = event.subject.y;
            })
            .on('drag', event => {
              event.subject.fx = event.x;
              event.subject.fy = event.y;
            })
            .on('end', event => {
              if (!event.active) simulation.alphaTarget(0);
              event.subject.fx = null;
              event.subject.fy = null;
            })
          );

        nodeGroup.append('circle')
          .attr('r', d => sizeScale(d.degree))
          .attr('fill', d => color(getNodeType(d) || 'DEFAULT'))
          .attr('stroke', '#fff')
          .attr('stroke-width', 1.5);

        nodeGroup.append('text')
          .attr('text-anchor', 'middle')
          .attr('dy', '0.35em')
          .style('font-size', '10px')
          .style('font-weight', 'bold')
          .style('fill', '#333')
          .text(d => d.id);

        const zoom = d3.zoom()
          .scaleExtent([0.5, 10])
          .on('zoom', event => graphGroup.attr('transform', event.transform));
        svg.call(zoom);

        simulation.on('tick', () => {
          edge
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);

          nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);
        });
      }
    </script>
  </body>
</html>
